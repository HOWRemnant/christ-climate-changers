<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christ's Climate Changers — Transforming Lives. Impacting Nations. Advancing His Kingdom.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a0f1e;--navy-mid:#111827;--navy-light:#1a2540;
  --dm:#0a2040;--dr:#123c73;
  --g:#c9a84c;--gl:#e8c87a;--gs:#f5da82;--gd:#7a5c1e;--gp:#f5e6c0;
  --cr:#f6f0e5;--cd:#ede3ce;--tm:#8a9ab5;
  --tl:rgba(255,255,255,.72);--tf:rgba(255,255,255,.42);
  --nh:75px; 
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.75;background:var(--navy);color:var(--cr);overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
body:has(#nav) { position: relative; }

a{text-decoration:none;color:inherit}
img{display:block;width:100%;height:100%;object-fit:cover}

.ccc-hero-title {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 600;
  letter-spacing: .08em;
  color: #fff;
  text-transform: uppercase;
  margin: 1.5rem auto 1rem;
  white-space: nowrap;
}

.ccc-hero-title span {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  color: var(--g);
  text-transform: none;
  letter-spacing: .03em;
}

.ccc-hero-sub {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.9rem, 1.8vw, 1.3rem);
  letter-spacing: .3em;
  color: var(--g);
  margin-top: 0.8rem;
}

.hero-content { margin-top: -2rem; }
.ccc-hero-title { margin-top: -1rem; }
.hero-bg-img { background-color: #1a2644 !important; }
.hero-over { background: rgba(0, 0, 0, 0.18) !important; }

.coaching-visual {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy-mid);
    overflow: hidden;
}

.coaching-visual img {
    width: 100%;
    height: 100%;
    max-height: 550px;
    object-fit: contain;
    display: block;
}

/* TYPE */
.label{display:inline-flex;align-items:center;gap:14px;font-family:'Cinzel',serif;font-size:10px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--g);margin-bottom:1.2rem}
.label::before{content:'';width:30px;height:.5px;background:var(--g);opacity:.7;flex-shrink:0}
.h2{font-family:'Cinzel',serif;font-size:clamp(1.6rem,3.5vw,3rem);font-weight:500;line-height:1.2;letter-spacing:.03em;color:#fff}
.h2 em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gl);font-size:1.15em;font-weight:300}
.body-t{font-size:17px;line-height:1.85;max-width:560px}
.muted{color:var(--tm)}.gold{color:var(--g)}
.rule{width:60px;height:.5px;background:var(--g);margin:2rem 0;opacity:.7}

/* LAYOUT */
.sec{padding:100px clamp(1.5rem,5vw,60px);max-width:1200px;margin:0 auto;position:relative;z-index:1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:80px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}\.testi-grid{gap:40px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
@media(max-width:1024px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border:none;transition:all .25s ease;white-space:nowrap}
.btn-g{background:var(--g);color:var(--navy);padding:16px 36px}
.btn-g:hover{background:var(--gl);transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.35)}
.btn-w{background:transparent;color:var(--g);border:.5px solid var(--g);padding:15px 32px}
.btn-w:hover{background:rgba(201,168,76,.08)}
.btn-nd{background:transparent;color:var(--navy);border:.5px solid var(--navy);padding:15px 32px}
.btn-nd:hover{background:var(--navy);color:#fff}
.btn-s{background:linear-gradient(120deg,var(--gd),var(--g),var(--gs),var(--g),var(--gd));background-size:300% 300%;animation:shimmer 4s ease infinite;color:var(--navy);padding:16px 36px;box-shadow:0 0 24px rgba(201,168,76,.4)}
.btn-s:hover{box-shadow:0 0 48px rgba(201,168,76,.75);transform:translateY(-2px)}
.br{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.br-c{justify-content:center}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--navy);animation:pdot 2s ease-in-out infinite;flex-shrink:0}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
@keyframes gpulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.18);opacity:1}}
@keyframes bookfloat{0%,100%{transform:perspective(700px) rotateY(-10deg) rotateX(2deg) translateY(0)}50%{transform:perspective(700px) rotateY(-10deg) rotateX(2deg) translateY(-14px)}}
@keyframes scrollPulse{0%,100%{opacity:.4;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.1)}}
@keyframes rsway{0%,100%{opacity:.5;transform:skewX(-3deg)}50%{opacity:1;transform:skewX(3deg)}}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* MAIN NAVIGATION RULES */
#nav {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  z-index: 99999 !important;
  height: var(--nh) !important;
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  padding: 0 clamp(1rem, 4vw, 60px) !important;
  
  /* Solid, pure ivory cream bar with no dark bleed-through */
  background: #fcf9f2 !important;
  background-color: #fcf9f2 !important;
  box-shadow: 0 4px 30px rgba(10, 21, 48, 0.06) !important;
  border-bottom: none !important;
  transition: all .3s ease !important;
}

/* THE HORIZONTAL ROYAL BLUE & GOLD STREAK */
#nav::after {
  content: '' !important;
  position: absolute !important;
  bottom: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 4px !important;
  background: linear-gradient(
    to right, 
    #0a2240 0%,    /* Deep Royal Blue Edge */
    #1d4ed8 35%,    /* Vibrant Core Royal Blue */
    #c9a84c 70%,    /* Rich Kingdom Gold */
    #f3d280 100%   /* Bright Highlight Gold Accent */
  ) !important;
  z-index: 999999 !important;
}

#nav.scrolled {
  background: #fcf9f2 !important;
  background-color: #fcf9f2 !important;
  box-shadow: 0 8px 32px rgba(10, 25, 64, 0.1) !important;
}

.nav-logo {
  display: flex !important;
  align-items: center !important;
  gap: 13px !important;
  flex-shrink: 0 !important;
}

/* BLENDS THE DARK CIRCLE CANVAS IN YOUR LOGO IMAGE OUT ENTIRELY */
.nav-logo img.logo-img {
  height: 54px !important;
  width: auto !important;
  max-height: 54px !important;
  object-fit: contain !important;
  display: block !important;
  border-radius: 50% !important;
  filter: invert(0.08) sepia(0.5) saturate(1.7) hue-rotate(4deg) brightness(1.06) !important;
  mix-blend-mode: darken !important;
}

.logo-wm {
  display: flex !important;
  flex-direction: column !important;
  gap: 2px !important;
}

.logo-name {
  font-family: 'Cinzel', serif !important;
  font-size: 13.5px !important;
  font-weight: 600 !important;
  color: #0c1b33 !important; /* Elegant deep readable charcoal blue text */
  letter-spacing: .15em !important;
  text-transform: uppercase !important;
}

.logo-tag {
  font-family: 'EB Garamond', serif !important;
  font-size: 11px !important;
  font-style: italic !important;
  color: #555e6d !important;
  letter-spacing: .04em !important;
}

.nav-links {
  display: flex !important;
  list-style: none !important;
  gap: 6px !important;
}

.nav-links>li>a {
  display: block !important;
  padding: 0 14px !important;
  line-height: var(--nh) !important;
  font-family: 'Cinzel', serif !important;
  font-size: 10px !important;
  font-weight: 600 !important;
  letter-spacing: .16em !important;
  text-transform: uppercase !important;
  color: #1e293b !important;
  position: relative !important;
  transition: color .2s ease !important;
}

.nav-links>li>a::after {
  content: '' !important;
  position: absolute !important;
  bottom: 16px !important;
  left: 14px !important;
  right: 14px !important;
  height: 2px !important;
  background: #c9a84c !important;
  transform: scaleX(0) !important;
  transform-origin: left !important;
  transition: transform .25s ease !important;
}

.nav-links>li>a:hover {
  color: #7a5c1e !important;
}

.nav-links>li>a:hover::after,
.nav-links>li>a.active::after {
  transform: scaleX(1) !important;
}

.nav-links>li>a.active {
  color: #7a5c1e !important;
}

.nav-actions {
  display: flex !important;
  align-items: center !important;
  gap: 12px !important;
  flex-shrink: 0 !important;
}

.nav-icon {
  width: 36px !important;
  height: 36px !important;
  border: 1px solid rgba(12, 27, 51, 0.15) !important;
  border-radius: 50% !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  font-size: 14px !important;
  color: #1e293b !important;
  transition: all .2s ease !important;
  cursor: pointer !important;
}

.nav-icon:hover {
  border-color: #c9a84c !important;
  color: #7a5c1e !important;
  background: rgba(201, 168, 76, 0.08) !important;
}

.nav-cta {
  background: #0a2240 !important;
  color: #fcf9f2 !important;
  border: none !important;
  padding: 10px 22px !important;
  font-family: 'Cinzel', serif !important;
  font-size: 10px !important;
  font-weight: 600 !important;
  letter-spacing: .14em !important;
  text-transform: uppercase !important;
  cursor: pointer !important;
  transition: all .2s ease !important;
}

.nav-cta:hover {
  background: #7a5c1e !important;
  color: #ffffff !important;
}

.hamburger {
  display: none !important;
  flex-direction: column !important;
  gap: 5px !important;
  cursor: pointer !important;
  padding: 4px !important;
  background: none !important;
  border: none !important;
}

.hamburger span {
  display: block !important;
  width: 22px !important;
  height: 2px !important;
  background: #0c1b33 !important;
  transition: all .3s ease !important;
}

.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg) !important; }
.hamburger.open span:nth-child(2) { opacity: 0 !important; transform: scaleX(0) !important; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg) !important; }

.mob-menu {
  position: fixed !important;
  inset: 0 !important;
  z-index: 998 !important;
  background: #fcf9f2 !important;
  padding: 100px 2.5rem 3rem !important;
  transform: translateX(100%) !important;
  transition: transform .4s cubic-bezier(.4, 0, .2, 1) !important;
  overflow-y: auto !important;
  display: flex !important;
  flex-direction: column !important;
}

.mob-menu.open { transform: translateX(0) !important; }
.mob-links { list-style: none !important; margin-bottom: 2rem !important; }

.mob-links li a {
  display: block !important;
  padding: 16px 0 !important;
  font-family: 'Cinzel', serif !important;
  font-size: 1.1rem !important;
  letter-spacing: .06em !important;
  text-transform: uppercase !important;
  color: #0c1b33 !important;
  border-bottom: 1px solid rgba(12, 27, 51, 0.06) !important;
  transition: all .2s ease !important;
}

@media(max-width: 1100px) {
  .nav-links, .nav-cta { display: none !important; }
  .hamburger { display: flex !important; }
}

@media(min-width: 1101px) {
  .mob-menu { display: none !important; }
}
</style>
</head>
<body>

  <nav id="nav">
    <a href="#" class="nav-logo">
      <img src="images/ccc-logo.png" alt="Christ's Climate Changers Logo" class="logo-img">
      <div class="logo-wm">
        <span class="logo-name">Christ's Climate Changers</span>
        <span class="logo-tag">Transforming Lives. Advancing His Kingdom.</span>
      </div>
    </a>

    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Ministries</a></li>
      <li><a href="#">Resources</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <div class="nav-actions">
      <div class="nav-icon"><span class="icon-search">🔍</span></div>
      <button class="nav-cta">Join Us</button>
      <button class="hamburger" id="hamburgerBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <div class="mob-menu" id="mobileMenu">
    <ul class="mob-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Ministries</a></li>
      <li><a href="#">Resources</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <button class="nav-cta" style="width: 100%;">Join Us</button>
  </div>

  <script>
    // Simple script to run your mobile hamburger menu toggle
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburgerBtn.addEventListener('click', () => {
      hamburgerBtn.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });
  </script>

</body>
</html>
