<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christ's Climate Changers — Transforming Lives. Impacting Nations. Advancing His Kingdom.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  /* Updated Light Palette: Soft Creams, White, Royal Blue & Gold */
  --navy: #fdfbf7;       /* Primary canvas background (Soft Premium Cream) */
  --navy-mid: #ffffff;   /* Mid ground sections (Pure White) */
  --navy-light: #f6f2e9; /* Light contrast bands (Warm Luxury Cream) */
  --dm: #0a2040;         /* Primary deep Royal Blue */
  --dr: #123c73;         /* Royal Accent Blue */
  --g: #c9a84c;          /* Deep Gold Accent */
  --gl: #b08e35;         /* Muted Gold for readability on light text */
  --gs: #f5da82;         /* Shimmer Gold */
  --gd: #7a5c1e;         /* Shadow Gold */
  --gp: #0a2040;         /* Text over light elements */
  --cr: #182238;         /* High-contrast body text */
  --cd: #2a3752;         /* Secondary descriptive text */
  --tm: #52607a;         /* Muted slate gray text color */
  --tl: rgba(10,32,64,.85);
  --tf: rgba(10,32,64,.55);
  --nh: 70px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.75;background:var(--navy);color:var(--cr);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
a{text-decoration:none;color:inherit}
img{display:block;width:100%;height:100%;object-fit:cover}

/*CSS*/
.nav-logo img.logo-img {
  height: 65px !important;
  width: auto !important;
  max-height: 70px !important;
  object-fit: contain !important;
  display: block !important;
}

.ccc-hero-title {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 600;
  letter-spacing: .08em;
  color: #0a2040;
  text-transform: uppercase;
  margin: 1.5rem auto 1rem;
  white-space: nowrap;
}

.ccc-hero-title span {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  color: var(--g);
  text-transform: none;
  letter-spacing: .03em;
}

.ccc-hero-sub {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.9rem, 1.8vw, 1.3rem);
  letter-spacing: .3em;
  color: var(--g);
  margin-top: 0.8rem;
}

.hero-content {
  margin-top: -2rem;
}

.ccc-hero-title {
  margin-top: -1rem;
}

.hero-bg-img {
  background-color: #fdfbf7 !important;
}

.hero-over {
  background: rgba(253, 251, 247, 0.92) !important;
}

.coaching-visual {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy-mid);
    overflow: hidden;
}

.coaching-visual img {
    width: 100%;
    height: 100%;
    max-height: 550px;
    object-fit: contain;
    display: block;
}

/* TYPE */
.label{display:inline-flex;align-items:center;gap:14px;font-family:'Cinzel',serif;font-size:10px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--g);margin-bottom:1.2rem}
.label::before{content:'';width:30px;height:.5px;background:var(--g);opacity:.7;flex-shrink:0}
.h2{font-family:'Cinzel',serif;font-size:clamp(1.6rem,3.5vw,3rem);font-weight:500;line-height:1.2;letter-spacing:.03em;color:var(--dm)}
.h2 em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gl);font-size:1.15em;font-weight:300}
.body-t{font-size:17px;line-height:1.85;max-width:560px}
.muted{color:var(--tm)}.gold{color:var(--g)}
.rule{width:60px;height:.5px;background:var(--g);margin:2rem 0;opacity:.7}

/* LAYOUT */
.sec{padding:100px clamp(1.5rem,5vw,60px);max-width:1200px;margin:0 auto;position:relative;z-index:1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:80px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}.testi-grid{gap:40px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
@media(max-width:1024px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border:none;transition:all .25s ease;white-space:nowrap}
.btn-g{background:var(--dm);color:#fff;padding:16px 36px}
.btn-g:hover{background:var(--dr);transform:translateY(-1px);box-shadow:0 8px 28px rgba(10,32,64,.2)}
.btn-w{background:transparent;color:var(--dm);border:.5px solid var(--g);padding:15px 32px}
.btn-w:hover{background:rgba(201,168,76,.08)}
.btn-nd{background:transparent;color:var(--dm);border:.5px solid var(--dm);padding:15px 32px}
.btn-nd:hover{background:var(--dm);color:#fff}
.btn-s{background:linear-gradient(120deg,var(--gd),var(--g),var(--gs),var(--g),var(--gd));background-size:300% 300%;animation:shimmer 4s ease infinite;color:#fff;padding:16px 36px;box-shadow:0 0 24px rgba(201,168,76,.25)}
.btn-s:hover{box-shadow:0 0 48px rgba(201,168,76,.45);transform:translateY(-2px)}
.br{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.br-c{justify-content:center}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--dm);animation:pdot 2s ease-in-out infinite;flex-shrink:0}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
@keyframes gpulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.18);opacity:.6}}
@keyframes bookfloat{0%,100%{transform:perspective(700px) rotateY(-10deg) rotateX(2deg) translateY(0)}50%{transform:perspective(700px) rotateY(-10deg) rotateX(2deg) translateY(-14px)}}
@keyframes scrollPulse{0%,100%{opacity:.4;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.1)}}
@keyframes rsway{0%,100%{opacity:.2;transform:skewX(-3deg)}50%{opacity:.5;transform:skewX(3deg)}}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:999;height:var(--nh);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,60px);background:rgba(253,251,247,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:.5px solid rgba(201,168,76,.25);transition:box-shadow .4s,border-color .4s}
#nav.scrolled{box-shadow:0 4px 40px rgba(10,32,64,.08);border-bottom-color:rgba(201,168,76,.4)}
.nav-logo{display:flex;align-items:center;gap:13px;flex-shrink:0}
.logo-crest{width:44px;height:44px;flex-shrink:0}
.logo-crest svg{width:100%;height:100%}
.logo-wm{display:flex;flex-direction:column;gap:2px}
.logo-name{font-family:'Cinzel',serif;font-size:13px;font-weight:500;color:var(--dm);letter-spacing:.18em;text-transform:uppercase}
.logo-tag{font-family:'EB Garamond',serif;font-size:11px;font-style:italic;color:var(--tm);letter-spacing:.06em}
.nav-links{display:flex;list-style:none}
.nav-links>li>a{display:block;padding:0 12px;line-height:var(--nh);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--cd);position:relative;transition:color .2s}
.nav-links>li>a::after{content:'';position:absolute;bottom:15px;left:12px;right:12px;height:.5px;background:var(--g);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
.nav-links>li>a:hover{color:var(--gl)}.nav-links>li>a:hover::after,.nav-links>li>a.active::after{transform:scaleX(1)}
.nav-links>li>a.active{color:var(--g)}
.nav-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-icon{width:34px;height:34px;border:.5px solid rgba(10,32,64,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--cd);transition:all .2s;cursor:pointer}
.nav-icon:hover{border-color:var(--g);color:var(--g);background:rgba(201,168,76,.08)}
.nav-cta{background:var(--dm);color:#fff;border:none;padding:9px 20px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.nav-cta:hover{background:var(--dr)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--dm);transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mob-menu{position:fixed;inset:0;z-index:998;background:rgba(253,251,247,.98);backdrop-filter:blur(24px);padding:calc(var(--nh) + 2rem) 2.5rem 3rem;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.mob-menu.open{transform:translateX(0)}
.mob-links{list-style:none;margin-bottom:2rem}
.mob-links li a{display:block;padding:15px 0;font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dm);border-bottom:.5px solid rgba(10,32,64,.07);transition:all .2s}
.mob-links li a:hover{color:var(--g);padding-left:10px}
@media(max-width:1100px){.nav-links,.nav-cta{display:none}.hamburger{display:flex}}
@media(min-width:1101px){.mob-menu{display:none!important}}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:calc(var(--nh)+60px) clamp(1.5rem,5vw,60px) 80px;position:relative;overflow:hidden}
.hero-bg-img{position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1800&q=80');background-size:cover;background-position:center 40%;filter:brightness(.95) contrast(0.85);mix-blend-mode:multiply;opacity:0.12}
.hero-over{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(201,168,76,.12) 0%,transparent 65%),linear-gradient(160deg,rgba(253,251,247,.95) 0%,rgba(246,242,233,.9) 50%,rgba(253,251,247,.95) 100%)}
.hero-rays{position:absolute;inset:0;overflow:hidden;z-index:1;pointer-events:none}
.ray{position:absolute;top:-10%;width:1.5px;height:130%;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.15),transparent);animation:rsway 20s ease-in-out infinite}
.ray:nth-child(1){left:55%}.ray:nth-child(2){left:65%;width:1px;animation-delay:5s;opacity:.5}.ray:nth-child(3){left:75%;animation-delay:10s}.ray:nth-child(4){left:48%;animation-delay:15s;opacity:.4}
.hero-glow{position:absolute;right:12%;top:35%;width:520px;height:520px;background:radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 65%);z-index:1;animation:gpulse 7s ease-in-out infinite;pointer-events:none}
.hero-content{position:relative;z-index:5;max-width:900px}
.hero-ornament{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.4em;color:var(--g);text-transform:uppercase;margin-bottom:32px;opacity:0;animation:fadeUp 1s ease .2s forwards;display:inline-flex;align-items:center;gap:16px}
.hero-ornament::before,.hero-ornament::after{content:'';display:block;width:40px;height:.5px;background:var(--g);opacity:.6}
.hero-title{font-family:'Cinzel',serif;font-size:clamp(2.8rem,7vw,6rem);font-weight:500;line-height:1.05;color:var(--dm);margin-bottom:8px;opacity:0;animation:fadeUp 1s ease .4s forwards;letter-spacing:.04em}
.hero-title span{color:var(--g);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:clamp(3.2rem,8.5vw,7rem)}
.hero-sub-cin{font-family:'Cinzel',serif;font-size:clamp(10px,2vw,14px);letter-spacing:.3em;text-transform:uppercase;color:var(--gl);margin-bottom:36px;opacity:0;animation:fadeUp 1s ease .6s forwards}
.hero-scripture{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(14px,1.8vw,19px);color:var(--cd);max-width:620px;margin:0 auto 52px;line-height:1.8;opacity:0;animation:fadeUp 1s ease .8s forwards}
.hero-scripture cite{display:block;font-style:normal;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:var(--g);margin-top:10px;text-transform:uppercase}
.hero-ctas{opacity:0;animation:fadeUp 1s ease 1s forwards}
.hero-uk{position:absolute;top:calc(var(--nh)+18px);right:24px;z-index:10;background:rgba(10,32,64,.05);border:.5px solid rgba(10,32,64,.12);backdrop-filter:blur(8px);padding:10px 16px;text-align:right}
.hero-uk .flag{font-size:18px;margin-bottom:3px}
.hero-uk .uk-l{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--cd);display:block}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:5;opacity:0;animation:fadeUp 1s ease 1.4s forwards}
.hero-scroll span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.3em;color:var(--tm);text-transform:uppercase}
.scroll-line{width:.5px;height:40px;background:linear-gradient(to bottom,var(--g),transparent);animation:scrollPulse 2s ease-in-out infinite}
.hero-book{position:absolute;right:clamp(2rem,8vw,8%);top:50%;transform:translateY(-50%);z-index:10;opacity:0;animation:fadeUp 1s .5s ease both}
.book3d{width:clamp(130px,13vw,185px);height:clamp(182px,18vw,260px);transform:perspective(700px) rotateY(-10deg) rotateX(2deg);animation:bookfloat 7s ease-in-out infinite;filter:drop-shadow(-12px 20px 44px rgba(10,32,64,.15))}
.book-face{width:100%;height:100%;background:linear-gradient(155deg,#ffffff,#fdfbf7,#f6f2e9);border-radius:3px 10px 10px 3px;border:1px solid rgba(201,168,76,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1.2rem;text-align:center;position:relative;overflow:hidden}
.book-face::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 40% 28%,rgba(201,168,76,.15) 0%,transparent 65%)}
.book-spine{position:absolute;left:-11px;top:0;bottom:0;width:11px;background:linear-gradient(to right,#ede3ce,#fdfbf7);border-radius:3px 0 0 3px;border:1px solid rgba(201,168,76,.2)}
.book-emblem{width:52px;height:52px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:.9rem;box-shadow:0 0 20px rgba(201,168,76,.3);position:relative}
.book-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;color:var(--dm);line-height:1.3;margin-bottom:6px;position:relative}
.book-ref{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);position:relative}
.book-line{width:36px;height:.5px;background:var(--g);opacity:.6;margin:8px auto;position:relative}
.hero-globe{position:absolute;right:clamp(1rem,5vw,4%);bottom:12%;z-index:10;opacity:0;animation:fadeUp 1s .8s ease both}
.globe{width:clamp(65px,8vw,95px);height:clamp(65px,8vw,95px);border-radius:50%;background:radial-gradient(circle at 36% 32%,var(--gs),var(--g) 42%,var(--gd) 70%,#3a2508);box-shadow:5px 8px 30px rgba(10,32,64,.15),inset -5px -5px 15px rgba(0,0,0,.2);overflow:hidden;position:relative;animation:bookfloat 9s 1s ease-in-out infinite}
.globe::before{content:'';position:absolute;top:11%;left:13%;width:30%;height:20%;background:rgba(255,255,255,.3);border-radius:50%;transform:rotate(-25deg)}
@media(max-width:768px){.hero-book,.hero-globe,.hero-uk{display:none}}

/* SLOGAN BAND */
.slogan-band{border-top:.5px solid rgba(201,168,76,.3);border-bottom:.5px solid rgba(201,168,76,.3);background:rgba(201,168,76,.08);padding:28px clamp(1.5rem,5vw,60px);display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap;position:relative;z-index:1}
.slogan-word{font-family:'Cinzel',serif;font-size:clamp(13px,2.2vw,20px);letter-spacing:.35em;color:var(--dm);text-transform:uppercase}
.slogan-dot{width:5px;height:5px;background:var(--g);transform:rotate(45deg);opacity:.8;flex-shrink:0}

/* FEATURES STRIP */
.strip{display:grid;grid-template-columns:repeat(4,1fr);background:var(--navy-light);border-bottom:.5px solid rgba(201,168,76,.2);position:relative;z-index:1}
.strip-item{padding:2.4rem 2rem;border-right:.5px solid rgba(201,168,76,.2);position:relative;overflow:hidden;cursor:pointer;transition:background .25s}
.strip-item:last-child{border-right:none}
.strip-item::after{content:'';position:absolute;bottom:0;left:0;width:0;height:.5px;background:var(--g);transition:width .35s ease}
.strip-item:hover {background:rgba(201,168,76,.06)}.strip-item:hover::after{width:100%}
.strip-icon{width:44px;height:44px;border:.5px solid var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--dm);margin-bottom:1rem;transition:all .25s}
.strip-item:hover .strip-icon{background:var(--dm);color:#fff}
.strip-title{font-family:'Cinzel',serif;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dm);margin-bottom:.5rem}
.strip-desc{font-size:15px;color:var(--tm);line-height:1.65;margin-bottom:1rem}
.strip-link{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--g);transition:color .2s}
.strip-item:hover .strip-link{color:var(--gl)}
@media(max-width:768px){.strip{grid-template-columns:1fr 1fr}.strip-item:nth-child(2){border-right:none}.strip-item:nth-child(1),.strip-item:nth-child(2){border-bottom:.5px solid rgba(201,168,76,.2)}}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,3vw,36px);font-weight:300;color:var(--dm);line-height:1.55;border-left:1.5px solid var(--g);padding-left:32px;margin:2rem 0}
.about-box{border:.5px solid rgba(201,168,76,.25);padding:28px;background:var(--navy-mid);margin-bottom:1rem}
.about-box-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.25em;color:var(--g);margin-bottom:8px;text-transform:uppercase}
.about-box-text{font-size:15px;color:var(--tm);line-height:1.8}
@media(max-width:780px){.about-grid{grid-template-columns:1fr;gap:3rem}}

/* PILLARS */
.pillars-bg{background:var(--navy-light);border-top:.5px solid rgba(201,168,76,.2);border-bottom:.5px solid rgba(201,168,76,.2);position:relative;z-index:1}
.pillars-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:60px}
.pillar{background:var(--navy-mid);border:.5px solid rgba(201,168,76,.2);padding:48px 36px;position:relative;transition:background .3s,border-color .3s;cursor:default}
.pillar:hover{background:rgba(201,168,76,.04);border-color:rgba(201,168,76,.45);box-shadow:0 4px 20px rgba(10,32,64,0.05)}
.pillar-num{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;color:var(--gl);margin-bottom:20px}
.pillar-title{font-family:'Cinzel',serif;font-size:14px;font-weight:500;color:var(--dm);margin-bottom:14px;letter-spacing:.06em}
.pillar-text{font-family:'EB Garamond',serif;font-size:16px;color:var(--tm);line-height:1.8}
@media(max-width:900px){.pillars-grid{grid-template-columns:1fr}}

/* COURSES */
.skool-banner{border:.5px solid rgba(201,168,76,.35);background:var(--navy-light);padding:1.5rem 2rem;margin-bottom:3rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.skool-banner .sup{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--g);margin-bottom:4px}
.skool-banner p{font-size:15px;color:var(--tm);max-width:520px;line-height:1.65}
.courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.ccard{border:.5px solid rgba(201,168,76,.2);padding:36px 28px;background:var(--navy-mid);position:relative;transition:transform .25s,border-color .25s;cursor:pointer}
.ccard:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.5);box-shadow:0 8px 32px rgba(10,32,64,0.06)}
.ccard.featured{border-color:var(--g);background:rgba(201,168,76,.03)}
.featured-tag{position:absolute;top:-1px;right:28px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;background:var(--g);color:#fff;padding:5px 14px}
.ccard-icon{font-size:26px;margin-bottom:18px}
.ccard-title{font-family:'Cinzel',serif;font-size:13px;font-weight:500;color:var(--dm);margin-bottom:10px;letter-spacing:.04em;line-height:1.45}
.ccard-desc{font-family:'EB Garamond',serif;font-size:15px;color:var(--tm);line-height:1.7;margin-bottom:18px}
.ccard-price{font-family:'Cinzel',serif;font-size:20px;color:var(--gl)}
.ccard-price span{font-size:12px;color:var(--tm);letter-spacing:.1em;display:block;margin-top:2px}
.ccard-cta{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dm);border:.5px solid rgba(201,168,76,.45);padding:10px 18px;transition:all .2s;background:rgba(201,168,76,.04)}
.ccard-cta:hover,.ccard.featured .ccard-cta{background:var(--dm);color:#fff}
.ccard.featured .ccard-cta:hover{background:var(--dr)}
.bundle-bar{margin-top:40px;padding:32px;border:.5px solid rgba(201,168,76,.35);background:var(--navy-light);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.bundle-bar-title{font-family:'Cinzel',serif;font-size:14px;color:var(--dm);margin-bottom:6px;letter-spacing:.05em}
.bundle-price{font-family:'Cinzel',serif;font-size:28px;color:var(--gl)}
.bundle-was{font-size:12px;color:var(--tm);text-decoration:line-through}
@media(max-width:900px){.courses-grid{grid-template-columns:1fr 1fr}}
@media(max-width:580px){.courses-grid{grid-template-columns:1fr}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--g);position:relative;z-index:1}
.stat{padding:2.6rem 1.5rem;text-align:center;border-right:.5px solid rgba(255,255,255,.2)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Cinzel',serif;font-size:clamp(1.8rem,3.5vw,3rem);font-weight:500;color:#fff;line-height:1;margin-bottom:.3rem}
.stat-l{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.85)}
@media(max-width:680px){.stats{grid-template-columns:1fr 1fr}.stat:nth-child(2){border-right:none}.stat:nth-child(1),.stat:nth-child(2){border-bottom:.5px solid rgba(255,255,255,.2)}}

/* APPOINTMENT SPLIT */
.split{display:grid;grid-template-columns:1fr 1fr}
.sp{padding:5rem clamp(2rem,5vw,4.5rem);position:relative;overflow:hidden}
.sp-light{background:var(--navy-light)}.sp-dark{background:var(--dm);color:#fff}
.sp h3{font-family:'Cinzel',serif;font-size:clamp(1.3rem,2.2vw,1.9rem);font-weight:500;letter-spacing:.04em;line-height:1.3;margin-bottom:.8rem}
.sp-light h3{color:var(--dm)}.sp-dark h3{color:#fff}
.sp p{font-family:'EB Garamond',serif;font-size:16px;line-height:1.75;max-width:320px;margin-bottom:2rem}
.sp-light p{color:var(--tm)}.sp-dark p:not(.btn){color:rgba(255,255,255,0.85)}
.sp-img{position:relative;overflow:hidden;margin-top:2.5rem}
.sp-img .inner{aspect-ratio:4/3;overflow:hidden}
.sp-img img{transition:transform .5s ease}
.sp-img:hover img{transform:scale(1.04)}
.sp-img-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,15,30,.2) 0%,transparent 60%)}
@media(max-width:680px){.split{grid-template-columns:1fr}}

/* COACHING */
.coaching-grid{display:grid;grid-template-columns:1fr 1fr}
.coaching-visual{position:relative;overflow:hidden;min-height:520px}
.coaching-visual img{position:absolute;inset:0;object-position:center top}
.coaching-visual-ov{position:absolute;inset:0;background:linear-gradient(to right,rgba(253,251,247,.3) 0%,transparent 60%)}
.coaching-content{padding:5rem clamp(2rem,5vw,4.5rem);display:flex;flex-direction:column;justify-content:center;background:var(--navy-mid)}
.ct-types{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:2rem 0}
.ct-card{background:var(--navy-light);border:.5px solid rgba(201,168,76,.2);padding:1.4rem;transition:all .25s;cursor:pointer;border-bottom:2px solid transparent}
.ct-card:hover{border-bottom-color:var(--g);background:rgba(201,168,76,.05)}
.ct-icon{font-size:1.3rem;margin-bottom:.4rem}
.ct-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dm);margin-bottom:.3rem}
.ct-desc{font-size:14px;color:var(--tm);line-height:1.55}
@media(max-width:780px){.coaching-grid,.ct-types{grid-template-columns:1fr}.coaching-visual{min-height:280px}}

/* COMMUNITY */
.comm-hero{position:relative;padding:7rem clamp(1.5rem,5vw,60px);overflow:hidden;text-align:center}
.comm-bg{position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=1800&q=80');background-size:cover;background-position:center;filter:brightness(0.95);mix-blend-mode:multiply;opacity:0.1}
.comm-over{position:absolute;inset:0;background:linear-gradient(180deg,var(--navy) 0%,rgba(246,242,233,.85) 50%,var(--navy) 100%)}
.comm-glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 65%);animation:gpulse 8s ease-in-out infinite;pointer-events:none}
.comm-content{position:relative;z-index:2;max-width:820px;margin:0 auto}
.comm-content .big{font-family:'Cinzel',serif;font-size:clamp(1.8rem,4.5vw,3.8rem);font-weight:500;color:var(--dm);line-height:1.1;margin-bottom:1.2rem;letter-spacing:.02em}
.comm-content .big em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gl);font-size:1.1em}
.comm-content .sub{font-family:'EB Garamond',serif;font-size:clamp(15px,2vw,18px);color:var(--cd);line-height:1.85;max-width:620px;margin:0 auto 2.8rem}
.kcard{background:var(--navy-mid);border:.5px solid rgba(201,168,76,.25);padding:2rem 1.7rem;transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;width:2px;height:0;background:var(--g);transition:height .4s ease}
.kcard:hover{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.02);transform:translateY(-4px)}.kcard:hover::before{height:100%}
.kcard-icon{font-size:1.6rem;margin-bottom:.8rem;display:block}
.kcard-title{font-family:'Cinzel',serif;font-size:12px;color:var(--dm);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
.kcard-desc{font-size:15px;color:var(--tm);line-height:1.6}
</style>
